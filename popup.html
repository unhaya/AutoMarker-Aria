<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="title-row">
        <h1>AutoMarker</h1>
        <label class="master-toggle" title="Enable auto-highlight">
          <input type="checkbox" id="masterToggle" title="Enable auto-highlight" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </header>

    <!-- L1-L8 color swatches: L1-4 left column, L5-8 right column -->
    <div class="color-grid">
      <div class="color-col">
        <div class="color-row" data-index="0"><span class="level-tag">L1</span><input type="color" class="color-picker" title="L1 color" value="#ffee58"></div>
        <div class="color-row" data-index="1"><span class="level-tag">L2</span><input type="color" class="color-picker" title="L2 color" value="#f48fb1"></div>
        <div class="color-row" data-index="2"><span class="level-tag">L3</span><input type="color" class="color-picker" title="L3 color" value="#b39ddb"></div>
        <div class="color-row" data-index="3"><span class="level-tag">L4</span><input type="color" class="color-picker" title="L4 color" value="#a5d6a7"></div>
      </div>
      <div class="color-col">
        <div class="color-row" data-index="4"><span class="level-tag">L5</span><input type="color" class="color-picker" title="L5 color" value="#ffb74d"></div>
        <div class="color-row" data-index="5"><span class="level-tag">L6</span><input type="color" class="color-picker" title="L6 color" value="#4fc3f7"></div>
        <div class="color-row" data-index="6"><span class="level-tag">L7</span><input type="color" class="color-picker" title="L7 color" value="#e57373"></div>
        <div class="color-row" data-index="7"><span class="level-tag">L8</span><input type="color" class="color-picker" title="L8 color" value="#aed581"></div>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="colorReset" class="secondary-btn">COLOR RESET</button>
    </div>

    <!-- Status -->
    <div class="status-bar">
      <span id="matchCount">Ready</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
